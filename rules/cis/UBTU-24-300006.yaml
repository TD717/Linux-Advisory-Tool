# CIS Ubuntu 24.04 LTS — Benchmark control
# Control: UBTU-24-300006
# Section: 1.53

- id: UBTU-24-300006
  section: "1.53"
  title: >
    The operating system library files must have mode "755" or less permissive.
  category: filesystem
  rationale: >
    Shared libraries must not be group- or world-writable; verify with find
    /lib /lib64 /usr/lib -perm /022.
  check_type: command_output_contains
  verification_command: "sh -c \"sudo find /lib /lib64 /usr/lib -perm /022 -type f 2>/dev/null | head -n1 | grep -q . && echo LIB_FILE_PERM_FINDING || true\""
  target: {}
  expected:
    substring: "LIB_FILE_PERM_FINDING"
  finding_condition: non_compliant_if_true
  recommendation: >
    Run: sudo find /lib /lib64 /usr/lib -perm /022 -type f -exec chmod 755 {} +
  severity: high
  tags:
    - cis
    - ubuntu-24
    - filesystem
