# CIS Ubuntu 24.04 LTS — Benchmark control
# Control: UBTU-24-100830
# Section: 1.25

- id: UBTU-24-100830
  section: "1.25"
  title: >
    The operating system must configure the SSH daemon to use MACs employing
    FIPS 140-3-approved cryptographic hashes.
  category: ssh
  rationale: >
    Verify the SSH server is configured to only use MACs that employ FIPS 140-3
    approved ciphers (see benchmark grep of sshd_config).
  check_type: command_output_not_contains
  verification_command: "grep -Eihs '^[[:space:]]*macs|macs' /etc/ssh/sshd_config /etc/ssh/sshd_config.d/*.conf 2>/dev/null; grep -irs macs /etc/ssh/sshd_config* 2>/dev/null || true"
  target: {}
  expected:
    substring: "hmac-sha2"
  finding_condition: non_compliant_if_true
  recommendation: >
    Configure MACs in /etc/ssh/sshd_config (e.g. MACs
    hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256).
    Reload SSH: sudo systemctl reload sshd.service
  severity: high
  tags:
    - cis
    - ubuntu-24
    - ssh
    - fips
