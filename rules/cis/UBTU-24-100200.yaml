# CIS Ubuntu 24.04 LTS — Benchmark control
# Control: UBTU-24-100200
# Section: 1.10
# Parts:    install, enabled, active

- id: UBTU-24-100200-install
  section: "1.10"
  title: "[UBTU-24-100200] Part: install — rsyslog package"
  category: logging
  rationale: >
    The operating system must be configured to preserve log records from failure
    events. Failure to a known state can address safety or security in accordance
    with the mission/business needs of the organization. Failure to a known secure
    state helps prevent a loss of confidentiality, integrity, or availability in
    the event of a failure of the information system or a component of the system.
  check_type: command_output_not_contains
  verification_command: "dpkg -l 2>/dev/null | grep rsyslog || true"
  target: {}
  expected:
    substring: "ii  rsyslog "
  finding_condition: non_compliant_if_true
  recommendation: >
    Install the log service by using the following command:
    sudo apt-get install rsyslog.
    Enable and activate the log service by using the following command:
    sudo systemctl enable rsyslog.service --now
  severity: high
  tags:
    - cis
    - ubuntu-24
    - rsyslog
    - UBTU-24-100200

- id: UBTU-24-100200-enabled
  section: "1.10"
  title: "[UBTU-24-100200] Part: enabled — rsyslog.service"
  category: logging
  rationale: >
    The log service must be enabled so logging remains available after reboot,
    consistent with CIS verification (systemctl is-enabled rsyslog.service).
  check_type: service_enabled
  target:
    service: rsyslog.service
  expected: {}
  finding_condition: non_compliant_if_true
  recommendation: >
    Enable and activate the log service:
    sudo systemctl enable rsyslog.service --now
  severity: high
  tags:
    - cis
    - ubuntu-24
    - rsyslog
    - UBTU-24-100200

- id: UBTU-24-100200-active
  section: "1.10"
  title: "[UBTU-24-100200] Part: active — rsyslog.service"
  category: logging
  rationale: >
    The log service must be active so records are preserved as required,
    consistent with CIS verification (systemctl is-active rsyslog.service).
  check_type: service_active
  target:
    service: rsyslog.service
  expected: {}
  finding_condition: non_compliant_if_true
  recommendation: >
    Enable and activate the log service:
    sudo systemctl enable rsyslog.service --now
  severity: high
  tags:
    - cis
    - ubuntu-24
    - rsyslog
    - UBTU-24-100200
