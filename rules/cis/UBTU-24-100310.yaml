# CIS Ubuntu 24.04 LTS — Benchmark control
# Control: UBTU-24-100310
# Section: 1.12

- id: UBTU-24-100310
  section: "1.12"
  title: >
    The operating system must enable and run the Uncomplicated Firewall (ufw).
  category: firewall
  rationale: >
    The operating system functionality must be capable of taking enforcement
    action if the audit reveals unauthorized activity.
  check_type: command_output_not_contains
  verification_command: "sudo ufw status 2>/dev/null || ufw status 2>/dev/null || true"
  target: {}
  expected:
    substring: "Status: active"
  finding_condition: non_compliant_if_true
  recommendation: >
    Enable ufw: sudo ufw enable
  severity: high
  tags:
    - cis
    - ubuntu-24
    - ufw
