# CIS Ubuntu 24.04 LTS — Benchmark control
# Control: UBTU-24-100010
# Section: 1.2

- id: UBTU-24-100010
  section: "1.2"
  title: >
    The operating system must not have the "systemd-timesyncd" package installed.
  category: time_synchronization
  rationale: >
    Inaccurate time stamps make it more difficult to correlate events and can
    lead to an inaccurate analysis.
  check_type: command_output_contains
  verification_command: "dpkg -l 2>/dev/null | grep systemd-timesyncd || true"
  target: {}
  expected:
    substring: "systemd-timesyncd"
  finding_condition: non_compliant_if_true
  recommendation: >
    Remove the systemd-timesyncd package if it is installed (for example with
    the package manager) and use the time synchronization stack required by your
    organization and the benchmark remediation guidance.
  severity: medium
  tags:
    - cis
    - ubuntu-24
    - time
