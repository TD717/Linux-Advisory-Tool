# CIS Ubuntu 24.04 LTS — Benchmark control
# Control: UBTU-24-102010
# Section: 1.33

- id: UBTU-24-102010
  section: "1.33"
  title: >
    The operating system must initiate session audits at system startup.
  category: boot
  rationale: >
    Verify kernel command line in grub enables auditing (audit=1 on linux entries).
  check_type: command_output_not_contains
  verification_command: "grep -E '^[[:space:]]*linux' /boot/grub/grub.cfg 2>/dev/null || true"
  target: {}
  expected:
    substring: "audit=1"
  finding_condition: non_compliant_if_true
  recommendation: >
    Edit /etc/default/grub and add audit=1 to GRUB_CMDLINE_LINUX, then sudo update-grub.
  severity: high
  tags:
    - cis
    - ubuntu-24
    - grub
    - audit
