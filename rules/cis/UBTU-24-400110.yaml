# CIS Ubuntu 24.04 LTS — Benchmark control
# Control: UBTU-24-400110
# Section: 1.81

- id: UBTU-24-400110
  section: "1.81"
  title: >
    The operating system must prevent direct login into the root account.
  category: authentication
  rationale: >
    Verify passwd -S root shows the account is locked (second field L).
  check_type: command_output_not_contains
  verification_command: "passwd -S root 2>/dev/null || true"
  target: {}
  expected:
    substring: " L "
  finding_condition: non_compliant_if_true
  recommendation: >
    Lock the root password login: sudo passwd -l root
  severity: high
  tags:
    - cis
    - ubuntu-24
    - root
