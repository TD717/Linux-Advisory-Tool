# CIS Ubuntu 24.04 LTS — Benchmark control
# Control: UBTU-24-100650
# Section: 1.19

- id: UBTU-24-100650
  section: "1.19"
  title: >
    The operating system must have the "SSSD" package installed.
  category: authentication
  rationale: >
    Multifactor authentication requires using two or more factors to achieve
    authentication. Factors include something a user knows, has, or is.
  check_type: command_output_not_contains
  verification_command: "dpkg -l 2>/dev/null | grep sssd || true"
  target: {}
  expected:
    substring: "ii  sssd "
  finding_condition: non_compliant_if_true
  recommendation: >
    Install the sssd service and required PAM/NSS packages: sudo apt install -y sssd, sudo apt install -y libpam-sss, sudo apt install -y libnss-sss
  severity: high
  tags:
    - cis
    - ubuntu-24
    - sssd
