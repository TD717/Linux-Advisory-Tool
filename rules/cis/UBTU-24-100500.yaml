# CIS Ubuntu 24.04 LTS — Benchmark control
# Control: UBTU-24-100500
# Section: 1.16

- id: UBTU-24-100500
  section: "1.16"
  title: >
    The operating system must have the "apparmor" package installed.
  category: apparmor
  rationale: >
    Verify the operating system has the "apparmor" package installed by using
    dpkg -l | grep apparmor, including lines such as the user-space parser and
    libapparmor1.
  check_type: command_output_not_contains
  verification_command: "dpkg -l 2>/dev/null | grep apparmor || true"
  target: {}
  expected:
    substring: "ii  apparmor "
  finding_condition: non_compliant_if_true
  recommendation: >
    Install the apparmor package: sudo apt-get install apparmor
  severity: high
  tags:
    - cis
    - ubuntu-24
    - apparmor
