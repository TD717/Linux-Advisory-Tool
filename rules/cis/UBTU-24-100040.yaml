# CIS Ubuntu 24.04 LTS — Benchmark control
# Control: UBTU-24-100040
# Section: 1.5

- id: UBTU-24-100040
  section: "1.5"
  title: >
    The operating system must not have the "rsh-server" package installed.
  category: network_services
  rationale: >
    Removing the "rsh-server" package decreases the risk of accidental or
    intentional activation of the RSH service.
  check_type: command_output_contains
  verification_command: "dpkg -l 2>/dev/null | grep rsh-server || true"
  target: {}
  expected:
    substring: "ii  rsh-server "
  finding_condition: non_compliant_if_true
  recommendation: >
    Remove the "rsh-server" package by using the following command:
    sudo apt-get remove rsh-server
  severity: high
  tags:
    - cis
    - ubuntu-24
    - rsh
