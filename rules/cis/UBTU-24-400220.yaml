# CIS Ubuntu 24.04 LTS — Benchmark control
# Control: UBTU-24-400220
# Section: 1.82

- id: UBTU-24-400220
  section: "1.82"
  title: >
    The operating system must store only encrypted representations of passwords.
  category: authentication
  rationale: >
    Verify pam_unix.so in /etc/pam.d/common-password includes sha512.
  check_type: command_output_not_contains
  verification_command: "grep pam_unix.so /etc/pam.d/common-password 2>/dev/null || true"
  target: {}
  expected:
    substring: "sha512"
  finding_condition: non_compliant_if_true
  recommendation: >
    Configure common-password with pam_unix.so obscure sha512 shadow remember=5
    rounds=100000 as required by your benchmark.
  severity: high
  tags:
    - cis
    - ubuntu-24
    - pam
