# Simulated apt upgrade: finding when at least one package would be upgraded.

- id: LOCAL-POLICY-PENDING-UPDATES
  section: policy
  title: No pending apt package upgrades (simulated dry-run)
  category: updates
  rationale: >
    Unpatched packages increase risk. This check uses apt-get -s upgrade; finding
    when any Inst line would be applied.
  check_type: command_output_contains
  verification_command: "sh -c \"apt-get -s upgrade 2>/dev/null | grep -q '^Inst ' && echo HAS_PENDING || echo NO_PENDING\""
  target: {}
  expected:
    substring: "HAS_PENDING"
  finding_condition: non_compliant_if_true
  recommendation: >
    Apply updates per organizational policy: sudo apt update && sudo apt upgrade
  severity: medium
  tags:
    - local-policy
    - updates
    - apt
